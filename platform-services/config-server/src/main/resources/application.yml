server:
  port: 8888

spring:
  application:
    name: config-server

  profiles:
    active: native

  cloud:
    config:
      server:
        native:
          # classpath:/config = embedded fallback (inside JAR)
          # file:${CONFIG_REPO_PATH} = external config-repo (higher priority, overrides classpath)
          # Set CONFIG_REPO_PATH in .env to absolute path of config-repo/ at project root.
          # Default ../../config-repo works when running ./mvnw spring-boot:run from this module dir.
          search-locations:
            - classpath:/config
            - "optional:file:${CONFIG_REPO_PATH:../../config-repo}"

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: "*"