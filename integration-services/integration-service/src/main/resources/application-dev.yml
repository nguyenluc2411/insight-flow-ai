spring:
  cloud:
    config:
      fail-fast: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.insightflow.integration: DEBUG
    org.springframework.kafka: INFO
    org.hibernate.SQL: DEBUG
