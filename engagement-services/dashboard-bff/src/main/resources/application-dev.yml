# =============================================================================
# dashboard-bff — application-dev.yml
# Local development overrides
# =============================================================================

spring:
  cloud:
    config:
      fail-fast: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.insightflow.bff: DEBUG
    org.springframework.web.reactive.function.client: DEBUG
