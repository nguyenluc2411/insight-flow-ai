# =============================================================================
# notification-service.yml — Config-server overrides for notification-service
# Port: 8091
# =============================================================================

spring:
  jpa:
    properties:
      hibernate:
        default_schema: notification_db
  flyway:
    schemas: notification_db
    default-schema: notification_db

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

app:
  notification:
    default-low-stock-threshold: 10
    mail-from: ${MAIL_FROM:noreply@insightflow.ai}
