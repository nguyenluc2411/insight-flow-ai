# =============================================================================
# auth-service.yml — Config-server overrides for auth-service
# Port: 8081
# =============================================================================

app:
  jwt:
    issuer: insightflow-auth-service
    expiration-minutes: 15
    refresh-expiration-days: 30
    # secret: injected via JWT_SECRET env var — MUST match api-gateway exactly

spring:
  jpa:
    properties:
      hibernate:
        default_schema: auth_db
  flyway:
    schemas: auth_db
    default-schema: auth_db
