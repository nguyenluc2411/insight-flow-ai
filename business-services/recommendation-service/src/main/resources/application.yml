server:
  port: 8091

spring:
  application:
    name: recommendation-service
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/${RECOMMENDATION_DB_NAME:insightflow_recommendation}
    username: ${POSTGRES_USER:insightflow}
    password: ${POSTGRES_PASSWORD:insightflow}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: recommendation-service-pool
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: recommendation_db
        format_sql: true
  flyway:
    enabled: true
    schemas: recommendation_db
    default-schema: recommendation_db
    create-schemas: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ai-recommendation-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        spring.json.trusted.packages: "*"

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

# Data-ingestion service (Feign) — must point at its new port 8088.
ingestion-service:
  base-url: ${DATA_INGESTION_URL:http://localhost:8088}

# Google Gemini — API key MUST be provided via env (no default committed).
ai:
  gemini:
    url: ${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent}
    api-key: ${GEMINI_API_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
