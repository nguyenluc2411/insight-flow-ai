server:
  port: 8081

spring:
  application:
    name: auth-service

  config:
    import: "optional:configserver:${CONFIG_SERVER_URL}"

  cloud:
    config:
      fail-fast: true
      retry:
        initial-interval: 1000
        max-interval: 2000
        multiplier: 1.5
        max-attempts: 6

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?currentSchema=${AUTH_DB_SCHEMA}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: auth-service-pool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: auth_db
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: auth_db
    default-schema: auth_db
    create-schemas: true
    baseline-on-migrate: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

# =============================================================================
# Eureka
# =============================================================================
eureka:
  instance:
    prefer-ip-address: true
    instance-id: "${spring.application.name}:${random.value}"
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_URL}

# =============================================================================
# App — JWT + token config
# JWT secret MUST be Base64-encoded and match api-gateway's secret exactly.
# NEVER use the placeholder below in production — inject via Config Server.
# =============================================================================
app:
  jwt:
    secret: ${JWT_SECRET}
    issuer: "insightflow-auth-service"
    expiration-minutes: 15
    refresh-expiration-days: 30

# =============================================================================
# Actuator
# =============================================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# =============================================================================
# SpringDoc OpenAPI
# =============================================================================
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: false
    path: /swagger-ui.html
  show-actuator: false

# =============================================================================
# Logging
# =============================================================================
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.insightflow.auth: INFO
