server:
  port: 8088

spring:
  application:
    name: data-ingestion-service
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/${INGESTION_DB_NAME:insightflow_ingestion}
    username: ${POSTGRES_USER:insightflow}
    password: ${POSTGRES_PASSWORD:insightflow}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: data-ingestion-service-pool
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: ingestion_db
        format_sql: true
  flyway:
    enabled: true
    schemas: ingestion_db
    default-schema: ingestion_db
    create-schemas: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ingestion-group-v3
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

# Enrichment dictionary service (member's product-catalog-service) used during ingestion.
catalog-service:
  base-url: ${ENRICHMENT_SERVICE_URL:http://localhost:8089}

# Object storage — MinIO (S3-compatible); endpoint-url points the AWS SDK at MinIO.
aws:
  s3:
    endpoint-url: ${MINIO_ENDPOINT:http://localhost:9000}
    region: ${MINIO_REGION:ap-southeast-1}
    bucket-name: ${MINIO_BUCKET:insightflow-bucket}

  credentials:
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    # Dev default must equal MinIO's root password (.env MINIO_SECRET_KEY/ROOT_PASSWORD);
    # IDE/mvnw runs don't load .env, so a mismatch makes S3 reads fail signing.
    secret-key: ${MINIO_SECRET_KEY:change_me_in_prod}

management:
  endpoints:
    web:
      exposure:
        include: health,info
