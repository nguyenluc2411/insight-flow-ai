server:
  port: 8091

spring:
  application:
    name: user-workspace-service
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/${WORKSPACE_DB_NAME:insightflow_workspace}
    username: ${POSTGRES_USER:insightflow}
    password: ${POSTGRES_PASSWORD:insightflow}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: user-workspace-service-pool
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: workspace_db
        format_sql: true
  flyway:
    enabled: true
    schemas: workspace_db
    default-schema: workspace_db
    create-schemas: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true    # <-- THÊM DÒNG NÀY VÀO LÀ CỨU CẢ THẾ GIỚI
    instance-id: ${spring.application.name}:${random.uuid}

# Object storage — MinIO (S3-compatible); endpoint-url points the AWS SDK at MinIO.
# Key names kept exactly as the service's @Value references; only bound to MINIO_* env.
aws:
  s3:
    endpoint-url: ${MINIO_ENDPOINT:http://localhost:9000}
    # Public HTTPS endpoint for browser-facing presigned URLs (server-side ops use
    # endpoint-url above). Empty in local dev → presigner falls back to endpoint-url.
    public-endpoint-url: ${MINIO_PUBLIC_ENDPOINT:}
    region: ${MINIO_REGION:ap-southeast-1}
    bucket-name: ${MINIO_BUCKET:insightflow-bucket}
    presign-expiration-minutes: 15
  credentials:
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    # Dev default must equal MinIO's root password (.env MINIO_SECRET_KEY/ROOT_PASSWORD);
    # IDE/mvnw runs don't load .env, so a mismatch makes the presigned URL fail signing.
    secret-key: ${MINIO_SECRET_KEY:change_me_in_prod}

management:
  endpoints:
    web:
      exposure:
        include: health,info
