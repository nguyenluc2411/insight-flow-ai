name: CI – Java Services

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    paths:
      - 'shared-core/**'
      - 'platform-services/**'
      - 'business-services/**'
      - 'integration-services/**'
      - 'engagement-services/**'
      - '.github/workflows/ci-java.yml'

jobs:
  build:
    name: Build & Docker verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # shared-core must be installed to local Maven repo before building services
      - name: Build shared-core
        run: |
          mvn -f shared-core/common-events/pom.xml    install -DskipTests -q
          mvn -f shared-core/common-security/pom.xml  install -DskipTests -q
          mvn -f shared-core/common-web/pom.xml       install -DskipTests -q
          mvn -f shared-core/common-fileparse/pom.xml install -DskipTests -q

      - name: Build platform services
        run: |
          mvn -f platform-services/discovery-server/pom.xml package -DskipTests -q
          mvn -f platform-services/config-server/pom.xml    package -DskipTests -q
          mvn -f platform-services/api-gateway/pom.xml      package -DskipTests -q

      - name: Build business services
        run: |
          mvn -f business-services/auth-service/pom.xml    package -DskipTests -q
          mvn -f business-services/catalog-service/pom.xml package -DskipTests -q
          mvn -f business-services/sales-service/pom.xml   package -DskipTests -q
          mvn -f business-services/billing-service/pom.xml package -DskipTests -q
          mvn -f business-services/user-workspace-service/pom.xml package -DskipTests -q

      - name: Build integration & engagement services
        run: |
          mvn -f integration-services/integration-service/pom.xml  package -DskipTests -q
          mvn -f engagement-services/dashboard-bff/pom.xml         package -DskipTests -q
          mvn -f engagement-services/notification-service/pom.xml  package -DskipTests -q

      # Pre-pull the shared base image with retries. Docker Hub pulls
      # occasionally i/o-timeout on GitHub runners; cache it once here so the
      # 13 service builds below reuse the local layer instead of each
      # re-hitting registry-1.docker.io.
      - name: Pre-pull base image (retry on Docker Hub flakes)
        run: |
          for i in 1 2 3 4 5; do
            docker pull eclipse-temurin:21-jre-alpine && break
            echo "base image pull failed (attempt $i/5), retrying in 15s..."
            sleep 15
          done

      # Build Docker images to verify Dockerfiles are correct (no push)
      - name: Docker build – all Java services
        run: |
          docker build -t insightflow/discovery-server:${{ github.sha }}   platform-services/discovery-server
          docker build -t insightflow/config-server:${{ github.sha }}      platform-services/config-server
          docker build -t insightflow/api-gateway:${{ github.sha }}        platform-services/api-gateway
          docker build -t insightflow/auth-service:${{ github.sha }}       business-services/auth-service
          docker build -t insightflow/catalog-service:${{ github.sha }}    business-services/catalog-service
          docker build -t insightflow/sales-service:${{ github.sha }}      business-services/sales-service
          docker build -t insightflow/billing-service:${{ github.sha }}     business-services/billing-service
          docker build -t insightflow/user-workspace-service:${{ github.sha }} business-services/user-workspace-service
          docker build -t insightflow/integration-service:${{ github.sha }} integration-services/integration-service
          docker build -t insightflow/dashboard-bff:${{ github.sha }}      engagement-services/dashboard-bff
          docker build -t insightflow/notification-service:${{ github.sha }} engagement-services/notification-service

      # Push to GHCR on merge to main (requires GITHUB_TOKEN — no extra secrets needed)
      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Push images to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          for svc in discovery-server config-server api-gateway auth-service catalog-service sales-service billing-service user-workspace-service integration-service dashboard-bff notification-service; do
            docker tag insightflow/${svc}:${{ github.sha }} ghcr.io/${OWNER}/${svc}:latest
            docker tag insightflow/${svc}:${{ github.sha }} ghcr.io/${OWNER}/${svc}:${{ github.sha }}
            docker push ghcr.io/${OWNER}/${svc}:latest
            docker push ghcr.io/${OWNER}/${svc}:${{ github.sha }}
          done

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: SSH & deploy Java services
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_PAT }}
          REPO_OWNER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GHCR_TOKEN,REPO_OWNER
          # Default is 10m; ghcr pulls of several images can stall and blow past it.
          command_timeout: "30m"
          script: |
            set -e
            OWNER=$(echo "$REPO_OWNER" | tr '[:upper:]' '[:lower:]')
            cd ~/insight-flow-ai
            git fetch origin main && git reset --hard origin/main
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$OWNER" --password-stdin
            export REGISTRY_PREFIX="ghcr.io/${OWNER}"
            SERVICES="discovery-server config-server api-gateway auth-service catalog-service sales-service billing-service user-workspace-service integration-service dashboard-bff notification-service"
            COMPOSE="docker compose \
              -f infrastructure/docker/docker-compose.yml \
              -f infrastructure/docker/docker-compose.services.yml \
              --env-file .env"
            # ghcr pulls occasionally stall (bytes freeze) and hang the whole deploy.
            # Bound each attempt with `timeout` so a stall is killed and retried —
            # reconnecting usually clears it.
            for i in 1 2 3; do
              timeout 600 $COMPOSE pull $SERVICES && break
              echo "pull attempt $i/3 stalled/failed, retrying in 10s..."
              sleep 10
            done
            $COMPOSE up -d $SERVICES
            # Reclaim disk: each deploy orphans the previous :latest layers.
            docker image prune -f || true
            docker logout ghcr.io
