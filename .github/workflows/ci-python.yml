name: CI – ML Service

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    paths:
      - 'intelligence-services/ml-service/**'
      - '.github/workflows/ci-python.yml'

jobs:
  build:
    name: Lint, test & Docker verify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: intelligence-services/ml-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: intelligence-services/ml-service/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff black

      - name: Lint with ruff
        run: ruff check app/

      - name: Format check with black
        run: black --check app/

      # Docker build to verify Dockerfile is correct (no push on PRs)
      - name: Docker build
        run: docker build -t insightflow/ml-service:${{ github.sha }} .

      # Push to GHCR on merge to main
      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Push to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          docker tag insightflow/ml-service:${{ github.sha }} ghcr.io/${OWNER}/ml-service:latest
          docker tag insightflow/ml-service:${{ github.sha }} ghcr.io/${OWNER}/ml-service:${{ github.sha }}
          docker push ghcr.io/${OWNER}/ml-service:latest
          docker push ghcr.io/${OWNER}/ml-service:${{ github.sha }}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: SSH & deploy ML service
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_PAT }}
          REPO_OWNER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GHCR_TOKEN,REPO_OWNER
          script: |
            set -e
            OWNER=$(echo "$REPO_OWNER" | tr '[:upper:]' '[:lower:]')
            cd ~/insight-flow-ai
            git fetch origin main && git reset --hard origin/main
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$OWNER" --password-stdin
            export REGISTRY_PREFIX="ghcr.io/${OWNER}"
            COMPOSE="docker compose \
              -f infrastructure/docker/docker-compose.yml \
              -f infrastructure/docker/docker-compose.services.yml \
              --env-file .env"
            $COMPOSE pull ml-service
            $COMPOSE up -d ml-service
            docker logout ghcr.io
