name: CI – ML Service

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    paths:
      - 'intelligence-services/ml-service/**'
      - '.github/workflows/ci-python.yml'

jobs:
  build:
    name: Lint, test & Docker verify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: intelligence-services/ml-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: intelligence-services/ml-service/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff black

      - name: Lint with ruff
        run: ruff check app/

      - name: Format check with black
        run: black --check app/

      # Docker build to verify Dockerfile is correct (no push on PRs)
      - name: Docker build
        run: docker build -t insightflow/ml-service:${{ github.sha }} .

      # Push to GHCR on merge to main
      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          docker tag insightflow/ml-service:${{ github.sha }} ghcr.io/${OWNER}/ml-service:latest
          docker tag insightflow/ml-service:${{ github.sha }} ghcr.io/${OWNER}/ml-service:${{ github.sha }}
          docker push ghcr.io/${OWNER}/ml-service:latest
          docker push ghcr.io/${OWNER}/ml-service:${{ github.sha }}
